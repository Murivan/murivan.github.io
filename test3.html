<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/pyodide/dev/full/pyodide.js"></script>
  </head>

  <body>
    <p>
      You can execute any Python code. Just enter something in the box below and
      click the button.
    </p>
    <input id="m" value="" />
    <input id="n" value="" />
    <input id="s" value="" />
    <input id="o" value="" />
    <button onclick="evaluatePython()">Go</button>
    <br />
    <br />
    <div>Output:</div>
    <textarea id="output" style="width: 100%;" rows="100" disabled></textarea>

    <script>
      const output = document.getElementById("output");
      const m = document.getElementById("m");
	  const n = document.getElementById("n");
      const s = document.getElementById("s");
      const o = document.getElementById("o");
      function addToOutput(s) {
        output.value += ">>>" + s + "\n";
      }

      output.value = "Initializing...\n";
      // init Pyodide
      async function main() {
        let pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install('https://murivan.github.io/cshcd_schroederm-0.0.9-py3-none-any.whl');
        output.value += "Ready!\n";
        return pyodide;
      }
      let pyodideReadyPromise = main();

      async function evaluatePython() {
        let pyodide = await pyodideReadyPromise;
        try {
          let output = pyodide.runPython(`
from cshcd_schroederm import cnshcd_builder
result=cnshcd_builder.entrypoint('3','5','s')
          `);
          addToOutput(output);
        } catch (err) {
          addToOutput(err);
        }
      }
    </script>
  </body>
</html>
