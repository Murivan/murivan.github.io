<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/pyodide/dev/full/pyodide.js"></script>
    <script type="text/javascript">
      async function main() {
        let pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install('https://murivan.github.io/cshcd_schroederm-0.0.9-py3-none-any.whl');
        await pyodide.runPython(`
from cshcd_schroederm import cnshcd_builder
result=cnshcd_builder.entrypoint('3','5','s')
print(result)
      `);
      }
      main();
    </script>
  </body>
</html>
