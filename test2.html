<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/pyodide/dev/full/pyodide.js"></script>
    <script type="text/javascript">
      async function main() {
        let pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        micropip.install('https://github.com/Murivan/murivan.github.io/blob/main/test_dmurivan-0.0.1-py3-none-any.whl')
        await pyodide.runPython(`
       import test_dmurivan
       result = test_dmurivan.cnshcd_builder(3,5)
       print(result)
      `);
      }
      main();
    </script>
  </body>
</html>
